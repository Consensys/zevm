name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    name: Test on Zig ${{ matrix.zig-version }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        zig-version: ['0.14.0', '0.15.0', '0.15.1', 'master']
        include:
          - zig-version: '0.14.0'
            zig-url: 'https://ziglang.org/download/0.14.0/zig-linux-x86_64-0.14.0.tar.xz'
          - zig-version: '0.15.0'
            zig-url: 'https://ziglang.org/download/0.15.0/zig-linux-x86_64-0.15.0.tar.xz'
          - zig-version: '0.15.1'
            zig-url: 'https://ziglang.org/download/0.15.1/zig-linux-x86_64-0.15.1.tar.xz'
          - zig-version: 'master'
            zig-url: 'https://ziglang.org/builds/zig-linux-x86_64-master.tar.xz'

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Zig ${{ matrix.zig-version }}
      run: |
        wget -q ${{ matrix.zig-url }}
        tar -xf zig-linux-x86_64-*.tar.xz
        sudo mv zig-linux-x86_64-*/zig /usr/local/bin/
        rm -rf zig-linux-x86_64-*
        zig version

    - name: Build project
      run: zig build

    - name: Run tests
      run: ./zig-out/bin/zevm-test

    - name: Run examples
      run: |
        ./zig-out/bin/simple_contract
        ./zig-out/bin/gas_inspector_example
        ./zig-out/bin/precompile_example

  build-matrix:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        zig-version: ['0.15.1']

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Zig (Ubuntu)
      if: matrix.os == 'ubuntu-latest'
      run: |
        wget -q https://ziglang.org/download/0.15.1/zig-linux-x86_64-0.15.1.tar.xz
        tar -xf zig-linux-x86_64-0.15.1.tar.xz
        sudo mv zig-linux-x86_64-0.15.1/zig /usr/local/bin/
        rm -rf zig-linux-x86_64-0.15.1*
        zig version

    - name: Install Zig (macOS)
      if: matrix.os == 'macos-latest'
      run: |
        brew install zig
        zig version

    - name: Install Zig (Windows)
      if: matrix.os == 'windows-latest'
      run: |
        choco install zig
        zig version

    - name: Build project
      run: zig build

    - name: Run tests
      run: ./zig-out/bin/zevm-test

  lint:
    name: Lint and Format Check
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Zig
      run: |
        wget -q https://ziglang.org/download/0.15.1/zig-linux-x86_64-0.15.1.tar.xz
        tar -xf zig-linux-x86_64-0.15.1.tar.xz
        sudo mv zig-linux-x86_64-0.15.1/zig /usr/local/bin/
        rm -rf zig-linux-x86_64-0.15.1*

    - name: Check formatting
      run: zig fmt --check .

    - name: Analyze code
      run: zig build -Danalyze

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Zig
      run: |
        wget -q https://ziglang.org/download/0.15.1/zig-linux-x86_64-0.15.1.tar.xz
        tar -xf zig-linux-x86_64-0.15.1.tar.xz
        sudo mv zig-linux-x86_64-0.15.1/zig /usr/local/bin/
        rm -rf zig-linux-x86_64-0.15.1*

    - name: Build with security checks
      run: |
        zig build -Doptimize=ReleaseSafe
        zig build -Doptimize=ReleaseFast

  benchmark:
    name: Performance Benchmark
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Zig
      run: |
        wget -q https://ziglang.org/download/0.15.1/zig-linux-x86_64-0.15.1.tar.xz
        tar -xf zig-linux-x86_64-0.15.1.tar.xz
        sudo mv zig-linux-x86_64-0.15.1/zig /usr/local/bin/
        rm -rf zig-linux-x86_64-0.15.1*

    - name: Build optimized version
      run: zig build -Doptimize=ReleaseFast

    - name: Run benchmarks
      run: ./zig-out/bin/zevm-bench

    - name: Upload benchmark results
      uses: actions/upload-artifact@v4
      with:
        name: benchmark-results
        path: benchmark-results.json