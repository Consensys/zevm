name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        zig-version: ['0.15.1']
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Zig
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: ${{ matrix.zig-version }}

      - name: Verify Zig installation
        run: zig version

      - name: Check formatting
        run: zig fmt --check .

      - name: Build project
        run: zig build

      - name: Run tests
        run: ./zig-out/bin/zevm-test

      - name: Run examples
        run: |
          ./zig-out/bin/simple_contract
          ./zig-out/bin/gas_inspector_example
          ./zig-out/bin/precompile_example
          ./zig-out/bin/contract_deployment
          ./zig-out/bin/uniswap_reserves
          ./zig-out/bin/custom_opcodes
          ./zig-out/bin/database_components
          ./zig-out/bin/cheatcode_inspector

      - name: Run benchmarks
        run: ./zig-out/bin/zevm-bench

  lint:
    name: Lint
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Zig
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: '0.15.1'

      - name: Format check
        run: zig fmt --check .

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Zig
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: '0.15.1'

      - name: Build with security checks
        run: |
          zig build -Doptimize=ReleaseSafe
          zig build -Doptimize=ReleaseFast

  benchmark:
    name: Performance Benchmark
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Zig
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: '0.15.1'

      - name: Build optimized version
        run: zig build -Doptimize=ReleaseFast

      - name: Run benchmarks
        run: ./zig-out/bin/zevm-bench

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: benchmark-results.json
